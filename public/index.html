<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #1b1b2f; border: 1px solid #cc0000; border-radius: 16px; padding: 3rem; max-width: 560px; width: 100%; text-align: center; }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 2.2rem; color: #cc0000; margin-bottom: 0.4rem; }
    .version { background: #cc0000; color: white; border-radius: 20px; padding: 0.2rem 0.8rem; font-size: 0.75rem; font-weight: bold; display: inline-block; margin-bottom: 1rem; }
    .subtitle { color: #aaa; margin-bottom: 2rem; line-height: 1.6; }
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 2rem; text-align: left; }
    .feature { background: #0f0f1a; border: 1px solid #333; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: #ccc; }
    .feature span { color: #cc0000; margin-right: 0.5rem; }
    .btn-row { display: flex; gap: 1rem; justify-content: center; }
    .btn { padding: 0.8rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.2s; }
    .btn-red { background: #cc0000; color: white; border: none; }
    .btn-red:hover { background: #aa0000; }
    .btn-outline { background: transparent; border: 1px solid #cc0000; color: #cc0000; }
    .btn-outline:hover { background: #cc000022; }
    .status { margin-top: 1.5rem; font-size: 0.8rem; color: #555; }
    .status span { color: #00ff88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📋</div>
    <h1>TaskFlow</h1>
    <div class="version">OpenShift v3.0</div>
    <p class="subtitle">Ekibinizin görevlerini takip edin.<br/>Atayın, önceliklendirin, tamamlayın.</p>
    <div class="features">
      <div class="feature"><span>✅</span>Görev oluştur & ata</div>
      <div class="feature"><span>📊</span>İlerleme takibi</div>
      <div class="feature"><span>🔐</span>Güvenli giriş</div>
      <div class="feature"><span>👑</span>Admin & üye rolleri</div>
      <div class="feature"><span>🔴</span>Öncelik seviyeleri</div>
      <div class="feature"><span>📅</span>Son tarih takibi</div>
    </div>
    <div class="btn-row">
      <a href="/register" class="btn btn-red">Kayıt Ol</a>
      <a href="/login" class="btn btn-outline">Giriş Yap</a>
    </div>
    <div class="status">Durum: <span id="st">kontrol ediliyor...</span></div>
  </div>
  <script>
    fetch('/health').then(r=>r.json()).then(d=>{
      document.getElementById('st').textContent = d.status + ' · DB: ' + d.mongodb;
    });
  </script>
</body>
</html>
